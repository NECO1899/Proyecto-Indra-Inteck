<div class="modulo-container">

  <h2>Depuración de Inventario</h2>
  <p>Busca registros y elimina uno o varios activos almacenados.</p>

  <!-- FILTRO -->
  <div class="card-siac">

    <div class="form-grid">

      <div class="form-group">
        <label>Categoría</label>
        <select id="categoria">
          <option value="" selected disabled>Selecciona...</option>
          <option>EQUIPO COMPUTADOR</option>
          <option>MONITOR</option>
          <option>MOUSE</option>
          <option>TECLADO</option>
          <option>IMPRESORA</option>
          <option>ESCÁNER</option>
          <option>PISTOLA LECTORA</option>
          <option>HDMI</option>
        </select>
      </div>

      <div class="form-group">
        <label>Criterio de búsqueda</label>
        <select id="criterio">
          <option value="" disabled selected>Selecciona categoría...</option>
        </select>
      </div>

      <div class="form-group">
        <label>Valor</label>
        <input id="valor" placeholder="Ingresa el valor...">
      </div>

    </div>

    <button id="btnBuscar" class="btn-siac">
      Buscar
    </button>

  </div>

  <!-- RESULTADOS -->
  <div class="card-siac">

    <div style="display:flex; justify-content:space-between; align-items:center;">
      <h3 class="titulo-resultados">Resultados</h3>

      <button id="btnEliminarTodos" class="btn-siac" style="display:none; background:#d63939;">
        Eliminar todos
      </button>
    </div>

    <div style="overflow-x:auto; margin-top:20px;">

      <table class="tabla-siac">
        <thead>
          <tr>
            <th>ID</th>
            <th>Categoría</th>
            <th>Usuario</th>
            <th>Serial</th>
            <th>Serial INDRA</th>
            <th>MAC Eth</th>
            <th>MAC WiFi</th>
            <th>RAM</th>
            <th>Disco</th>
            <th>Descripción</th>
            <th>Creado</th>
            <th>Eliminar</th>
          </tr>
        </thead>
        <tbody id="tbody"></tbody>
      </table>

    </div>

  </div>

</div>
